
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);font-size:13px}
.wrap{padding:12px 0 24px}

/* 상단 필터 + 요약 */
.top-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-label{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
.filter-btn{font-size:11px;padding:4px 12px;border-radius:14px;border:0.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary)}
.filter-btn.on{color:var(--color-text-primary);border-color:var(--color-border-primary);background:var(--color-background-secondary)}
.count-badge{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary);margin-left:auto}

/* 카테고리 탭 */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-tab{font-size:11px;padding:5px 12px;border-radius:14px;border:0.5px solid var(--color-border-secondary);cursor:pointer;display:flex;align-items:center;gap:5px;background:var(--color-background-primary)}
.cat-tab.on{border-width:1.5px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-n{font-size:10px;font-weight:500;padding:1px 5px;border-radius:6px;min-width:18px;text-align:center}

/* 아이템 리스트 */
.item-list{display:grid;gap:8px}
.item-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;overflow:hidden}
.item-head{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer}
.s-chip{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.item-fb{font-size:12px;color:var(--color-text-primary);flex:1;line-height:1.4}
.item-pid{font-size:10px;color:var(--color-text-tertiary);white-space:nowrap;flex-shrink:0}
.item-chevron{font-size:10px;color:var(--color-text-tertiary);flex-shrink:0}
.item-body{display:none;padding:8px 12px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.item-reason-lbl{font-size:9px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.item-reason{font-size:11px;color:var(--color-text-secondary);line-height:1.55}

.empty-msg{font-size:12px;color:var(--color-text-tertiary);text-align:center;padding:32px 0}

/* OOT 구분선 */
.oot-section{margin-top:20px;border-top:1px dashed var(--color-border-secondary);padding-top:14px}
.oot-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:10px}
</style>

var currentFilter = 'all';
var currentCat = 'ALL';

function sColor(s){ return s>=4?{bg:'#C8E6C9',fc:'#2E7D32'}:s<=2?{bg:'#FFCDD2',fc:'#C62828'}:{bg:'#FFF9C4',fc:'#E65100'} }

function getFiltered(){
  var items = ALL_ITEMS.filter(function(it){
    if(currentFilter==='pos') return it.valence==='pos';
    if(currentFilter==='neg') return it.valence==='neg';
    return true;
  }).filter(function(it){
    if(currentCat==='ALL') return true;
    return it.cat===currentCat;
  });
  return items;
}

function catCount(catId, filter){
  return ALL_ITEMS.filter(function(it){
    var valOk = filter==='all'||( filter==='pos'&&it.valence==='pos' )||( filter==='neg'&&it.valence==='neg' );
    return valOk && (catId==='ALL'||it.cat===catId);
  }).length;
}

function buildCatTabs(){
  var tabsEl = document.getElementById('cat-tabs');
  tabsEl.innerHTML = '';

  // ALL tab
  var allBtn = document.createElement('button');
  allBtn.className = 'cat-tab' + (currentCat==='ALL'?' on':'');
  allBtn.style.borderColor = currentCat==='ALL'?'#555':'';
  allBtn.innerHTML = '<span style="font-size:12px">전체</span><span class="cat-n" style="background:#E0E0E0;color:#555">'+catCount('ALL',currentFilter)+'</span>';
  allBtn.onclick = function(){ currentCat='ALL'; buildCatTabs(); renderItems(); };
  tabsEl.appendChild(allBtn);

  CATS.forEach(function(c){
    var n = catCount(c.id, currentFilter);
    var isOn = currentCat===c.id;
    var btn = document.createElement('button');
    btn.className = 'cat-tab' + (isOn?' on':'');
    btn.style.borderColor = isOn?c.color:'';
    btn.innerHTML = '<span class="cat-dot" style="background:'+c.color+'"></span>'
      +'<span style="font-size:12px;color:'+(isOn?c.color:'var(--color-text-primary)')+'">'+c.label+'</span>'
      +'<span class="cat-n" style="background:'+(isOn?c.color:c.light)+';color:'+(isOn?'#fff':c.color)+'">'+n+'</span>';
    btn.onclick = (function(cid){ return function(){ currentCat=cid; buildCatTabs(); renderItems(); }; })(c.id);
    tabsEl.appendChild(btn);
  });
}

function renderItems(){
  var items = getFiltered();
  var list = document.getElementById('item-list');
  list.innerHTML = '';

  // badge
  var total = ALL_ITEMS.filter(function(it){
    if(currentFilter==='pos') return it.valence==='pos';
    if(currentFilter==='neg') return it.valence==='neg';
    return true;
  }).length;
  var catLabel = currentCat==='ALL'?'전체':CATS.find(function(c){return c.id===currentCat}).label;
  document.getElementById('count-badge').textContent = catLabel+' '+items.length+'개 표시 / 유효 '+total+'개';

  if(!items.length){
    list.innerHTML = '<div class="empty-msg">해당 필터 조건에 맞는 항목이 없습니다.</div>';
    return;
  }

  var catColor = currentCat==='ALL'?'var(--color-border-secondary)':CATS.find(function(c){return c.id===currentCat}).color;

  items.forEach(function(it){
    var sc = sColor(it.sentiment);
    var card = document.createElement('div');
    card.className = 'item-card';
    card.style.borderLeft = '3px solid ' + (currentCat==='ALL'?(CATS.find(function(c){return c.id===it.cat})||{color:'#ccc'}).color:catColor);

    var head = document.createElement('div');
    head.className = 'item-head';
    head.innerHTML = '<span class="s-chip" style="background:'+sc.bg+';color:'+sc.fc+'">'+it.sentiment+'</span>'
      +'<span class="item-fb">'+it.feedback+'</span>'
      +'<span class="item-pid">'+it.pid+'</span>'
      +'<span class="item-chevron">▼</span>';

    var body = document.createElement('div');
    body.className = 'item-body';
    var catObj = CATS.find(function(c){return c.id===it.cat})||{label:it.cat,color:'#888',light:'#eee'};
    body.innerHTML = '<div class="item-reason-lbl">Reason</div>'
      +'<div class="item-reason">'+it.reason+'</div>'
      +'<div style="margin-top:8px"><span style="font-size:10px;padding:2px 7px;border-radius:6px;background:'+catObj.light+';color:'+catObj.color+';font-weight:500">'+catObj.label+'</span></div>';

    head.onclick = function(){
      var open = body.style.display==='block';
      body.style.display = open?'none':'block';
      head.querySelector('.item-chevron').textContent = open?'▼':'▲';
    };

    card.appendChild(head);
    card.appendChild(body);
    list.appendChild(card);
  });

  // OOT 렌더
  var ootList = document.getElementById('oot-list');
  ootList.innerHTML='';
  var ootFiltered = OOT_ITEMS.filter(function(it){
    if(currentFilter==='pos') return it.valence==='pos';
    if(currentFilter==='neg') return it.valence==='neg';
    return true;
  });
  document.querySelector('.oot-title').textContent = '⚠ Task 미이해 / 분류 불가 항목 (OOT) — '+ootFiltered.length+'개 · Taxonomy 분석에서 제외';
  ootFiltered.forEach(function(it){
    var sc = sColor(it.sentiment);
    var card = document.createElement('div');
    card.className = 'item-card';
    card.style.borderLeft = '3px solid #bbb';
    card.style.opacity = '0.7';
    var head = document.createElement('div');
    head.className = 'item-head';
    head.innerHTML = '<span class="s-chip" style="background:'+sc.bg+';color:'+sc.fc+'">'+it.sentiment+'</span>'
      +'<span class="item-fb">'+it.feedback+'</span>'
      +'<span class="item-pid">'+it.pid+'</span>'
      +'<span class="item-chevron">▼</span>';
    var body = document.createElement('div');
    body.className = 'item-body';
    body.innerHTML = '<div class="item-reason-lbl">Reason</div><div class="item-reason">'+it.reason+'</div>';
    head.onclick = function(){
      var open=body.style.display==='block';
      body.style.display=open?'none':'block';
      head.querySelector('.item-chevron').textContent=open?'▼':'▲';
    };
    card.appendChild(head); card.appendChild(body); ootList.appendChild(card);
  });
}

function setFilter(f, btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  currentFilter = f;
  buildCatTabs();
  renderItems();
}

// init
buildCatTabs();
renderItems();
</script>
